<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">GhostReceipt Animated Banner</title>
  <desc id="desc">Animated cyber-styled GhostReceipt title and pulse lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)" rx="16" />

  <g opacity="0.22">
    <line x1="40" y1="64" x2="1160" y2="64" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="96" x2="1160" y2="96" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="128" x2="1160" y2="128" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="160" x2="1160" y2="160" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="192" x2="1160" y2="192" stroke="#334155" stroke-width="1" />
  </g>

  <text x="64" y="120" fill="#e2e8f0" font-family="monospace" font-size="52" font-weight="700" filter="url(#glow)">
    G H O S T R E C E I P T
  </text>

  <text x="68" y="162" fill="#93c5fd" font-family="monospace" font-size="20" opacity="0.92">
    prove payment facts | keep identities private | share verifiable receipts
  </text>

  <g>
    <line x1="64" y1="200" x2="1136" y2="200" stroke="url(#line)" stroke-width="2" opacity="0.55" />
    <rect x="64" y="195" width="180" height="10" fill="#22d3ee" opacity="0.85">
      <animate attributeName="x" values="64;956;64" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <g opacity="0.65" fill="#34d399" font-family="monospace" font-size="14">
    <text x="68" y="36">[ORACLE: ONLINE]</text>
    <text x="278" y="36">[ZK: READY]</text>
    <text x="430" y="36">[MODE: NO-CARD]</text>
    <text x="650" y="36">[USER API KEY: OPTIONAL]</text>
  </g>
</svg>
