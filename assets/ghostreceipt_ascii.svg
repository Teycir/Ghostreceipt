<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">GhostReceipt Animated Banner</title>
  <desc id="desc">Animated cyber-styled GhostReceipt banner with ghost mascot, glow effects, and status indicators.</desc>

  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="60%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0d1a1a"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Sweep bar gradient -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>

    <!-- Ghost body gradient -->
    <linearGradient id="ghostBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <!-- Glow filter for title -->
    <filter id="titleGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for ghost -->
    <filter id="ghostGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow for accents -->
    <filter id="cyanGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path to contain the banner -->
    <clipPath id="bannerClip">
      <rect width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════ BACKGROUND ═══════════════════════════════ -->
  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>

  <!-- Grid lines (subtle) -->
  <g clip-path="url(#bannerClip)" opacity="0.14">
    <line x1="0" y1="56"  x2="1200" y2="56"  stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="112" x2="1200" y2="112" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="168" x2="1200" y2="168" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="224" x2="1200" y2="224" stroke="#334155" stroke-width="1"/>
    <line x1="200"  y1="0" x2="200"  y2="280" stroke="#334155" stroke-width="1"/>
    <line x1="600"  y1="0" x2="600"  y2="280" stroke="#334155" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="280" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Animated scanline sweep -->
  <rect clip-path="url(#bannerClip)" x="0" y="0" width="1200" height="3" fill="#22d3ee" opacity="0.08">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,280;0,0" dur="5s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- ═══════════════════════════════ GHOST MASCOT ════════════════════════════ -->
  <g transform="translate(48, 60)">
    <!-- Floating animation wrapper -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

      <!-- Glow aura behind ghost -->
      <ellipse cx="55" cy="80" rx="42" ry="42" fill="#22d3ee" opacity="0.06">
        <animate attributeName="rx" values="42;48;42" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.06;0.12;0.06" dur="3s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Ghost body -->
      <path d="M20 95 C20 60 30 32 55 32 C80 32 90 60 90 95 L90 118 L79 108 L69 118 L58 108 L47 118 L36 108 L20 118 Z"
        fill="url(#ghostBody)" filter="url(#ghostGlow)"/>

      <!-- Eyes -->
      <ellipse cx="43" cy="82" rx="9" ry="10" fill="#0b1020"/>
      <ellipse cx="67" cy="82" rx="9" ry="10" fill="#0b1020"/>

      <!-- Cyan shine in eyes -->
      <circle cx="46" cy="78" r="3.5" fill="#22d3ee" opacity="0.95">
        <animate attributeName="opacity" values="0.95;0.4;0.95" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="78" r="3.5" fill="#22d3ee" opacity="0.95">
        <animate attributeName="opacity" values="0.95;0.4;0.95" dur="4s" begin="0.3s" repeatCount="indefinite"/>
      </circle>

      <!-- Blink animation (scale eye height to 0) -->
      <ellipse cx="43" cy="82" rx="9" ry="10" fill="#0b1020">
        <animate attributeName="ry" values="10;10;10;10;0.5;10;10;10;10;10;10;10;10;10;10;0.5;10" dur="7s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="67" cy="82" rx="9" ry="10" fill="#0b1020">
        <animate attributeName="ry" values="10;10;10;10;0.5;10;10;10;10;10;10;10;10;10;10;0.5;10" dur="7s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- ═══════════════════════════════ STATUS TAGS (top row) ════════════════════ -->
  <!-- Each tag fades in sequentially -->
  <g font-family="monospace" font-size="13" fill="#34d399" filter="url(#cyanGlow)">
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75" dur="0.5s" begin="0.2s" fill="freeze"/>
      <text x="170" y="36">[ORACLE: ONLINE]</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75" dur="0.5s" begin="0.7s" fill="freeze"/>
      <text x="380" y="36">[ZK: READY]</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75" dur="0.5s" begin="1.2s" fill="freeze"/>
      <text x="530" y="36">[MODE: NO-CARD]</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75" dur="0.5s" begin="1.7s" fill="freeze"/>
      <text x="760" y="36">[USER KEY: OPTIONAL]</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.75;0.75" dur="0.5s" begin="2.2s" fill="freeze"/>
      <text x="1010" y="36">[PRIVACY: MAX]</text>
    </g>
  </g>

  <!-- Blinking cursor on last tag -->
  <rect x="1163" y="22" width="8" height="14" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══════════════════════════════ TITLE ═══════════════════════════════════ -->
  <!-- Glitch shadow layers (offset, brief flicker) -->
  <text x="169" y="136" fill="#22d3ee" font-family="monospace" font-size="58" font-weight="700" opacity="0">
    GHOSTRECEIPT
    <animate attributeName="x" values="169;173;167;169" dur="0.15s" begin="3s" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0;0.33;0.66;1"/>
    <animate attributeName="opacity" values="0;0;0.4;0;0;0;0;0;0.3;0;0" dur="8s" begin="3s" repeatCount="indefinite"/>
  </text>
  <text x="169" y="136" fill="#f43f5e" font-family="monospace" font-size="58" font-weight="700" opacity="0">
    GHOSTRECEIPT
    <animate attributeName="x" values="169;165;172;169" dur="0.15s" begin="3.05s" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0;0.33;0.66;1"/>
    <animate attributeName="opacity" values="0;0;0.3;0;0;0;0;0;0.25;0;0" dur="8s" begin="3.05s" repeatCount="indefinite"/>
  </text>

  <!-- Main title -->
  <text x="169" y="136" fill="url(#titleGrad)" font-family="monospace" font-size="58" font-weight="700" filter="url(#titleGlow)" opacity="0">
    GHOSTRECEIPT
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- ═══════════════════════════════ TAGLINE ══════════════════════════════════ -->
  <text x="172" y="178" fill="#93c5fd" font-family="monospace" font-size="19" opacity="0">
    prove payment facts · keep identities private · share verifiable receipts
    <animate attributeName="opacity" values="0;0.9" dur="0.8s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- ═══════════════════════════════ BOTTOM SWEEP BARS ════════════════════════ -->
  <!-- Track line -->
  <line x1="168" y1="218" x2="1160" y2="218" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>

  <!-- Primary sweep -->
  <rect x="168" y="213" width="220" height="10" rx="5" fill="url(#sweep)" opacity="0.9">
    <animate attributeName="x" values="168;940;168" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Secondary sweep (offset phase, narrower) -->
  <rect x="168" y="213" width="80" height="10" rx="5" fill="url(#sweep)" opacity="0.5">
    <animate attributeName="x" values="940;168;940" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- ═══════════════════════════════ CORNER BRACKETS ══════════════════════════ -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.5">
    <!-- Top-left -->
    <polyline points="8,24 8,8 24,8"/>
    <!-- Top-right -->
    <polyline points="1176,8 1192,8 1192,24"/>
    <!-- Bottom-left -->
    <polyline points="8,256 8,272 24,272"/>
    <!-- Bottom-right -->
    <polyline points="1176,272 1192,272 1192,256"/>
  </g>

  <!-- ═══════════════════════════════ BOTTOM LABELS ═════════════════════════════ -->
  <g font-family="monospace" font-size="12" opacity="0.45">
    <text x="168" y="248" fill="#64748b">v0.1.0</text>
    <text x="240" y="248" fill="#64748b">·</text>
    <text x="252" y="248" fill="#64748b">Cloudflare Pages</text>
    <text x="420" y="248" fill="#64748b">·</text>
    <text x="432" y="248" fill="#64748b">Ed25519 Oracle</text>
    <text x="590" y="248" fill="#64748b">·</text>
    <text x="602" y="248" fill="#64748b">Circom2 + snarkjs</text>
    <text x="780" y="248" fill="#64748b">·</text>
    <text x="792" y="248" fill="#64748b">BSL 1.1</text>
  </g>
</svg>
