name: Live Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '15 3 * * *'

concurrency:
  group: live-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  live-oracle:
    name: Live Oracle BTC/ETH
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run live oracle integration tests
        run: npm run test:live:oracle

