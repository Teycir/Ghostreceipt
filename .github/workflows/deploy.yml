name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security checks
        run: npm run check:secrets

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://ghostreceipt.pages.dev' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ghostreceipt
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

      - name: Deployment summary
        run: |
          echo "✅ Deployment complete!"
          echo "🔗 URL: https://ghostreceipt.pages.dev"
          echo ""
          echo "⚠️  Remember to set secrets in Cloudflare Pages dashboard:"
          echo "   - ORACLE_PRIVATE_KEY"
          echo "   - ETHERSCAN_API_KEY"
          echo "   - ETHERSCAN_API_KEY_2 (optional)"
          echo "   - ETHERSCAN_API_KEY_3 (optional)"
