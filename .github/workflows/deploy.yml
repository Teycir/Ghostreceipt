name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Check for secrets
        run: npm run check:secrets

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ github.ref == 'refs/heads/main' && 'https://ghostreceipt.pages.dev' || 'https://preview.ghostreceipt.pages.dev' }}
          NEXT_PUBLIC_APP_NAME: GhostReceipt

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 8f49c311ff2506c6020f060b8c1da686
          projectName: ghostreceipt
          directory: .next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}
