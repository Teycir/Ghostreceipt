<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ghostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0b1020"/>

  <!-- Glow halo behind ghost -->
  <ellipse cx="16" cy="15" rx="10" ry="10" fill="url(#glow)"/>

  <!-- Ghost body -->
  <path
    d="M8 20 C8 12 10 7 16 7 C22 7 24 12 24 20 L24 25 L21 22 L18.5 25 L16 22 L13.5 25 L11 22 L8 25 Z"
    fill="url(#ghostGrad)"
    filter="url(#glowFilter)"
  />

  <!-- Eyes -->
  <ellipse cx="13" cy="17" rx="2" ry="2.2" fill="#0b1020"/>
  <ellipse cx="19" cy="17" rx="2" ry="2.2" fill="#0b1020"/>

  <!-- Cyan eye shine -->
  <circle cx="13.7" cy="16.2" r="0.7" fill="#22d3ee" opacity="0.9"/>
  <circle cx="19.7" cy="16.2" r="0.7" fill="#22d3ee" opacity="0.9"/>

  <!-- Subtle top grid lines to hint "cyber" -->
  <line x1="1" y1="3" x2="31" y2="3" stroke="#22d3ee" stroke-width="0.3" opacity="0.3"/>
  <line x1="1" y1="29" x2="31" y2="29" stroke="#34d399" stroke-width="0.3" opacity="0.3"/>
</svg>
